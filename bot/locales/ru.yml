warnings: Уведомления
subscription_access: Доступ по подписке
subscription_access_text: |-
  Настройки обязательной подписки на канал клуба для регистрации на мероприятия.
  
  Канал, на который необходимо подписаться: {{ if .ChannelName }}@{{ .ChannelName }}{{ else }}Не установлен{{end}}
  
  ❗️Важно❗️
  Для корректной работы требуется:
  - Канал клуба должен быть публичным
  - Необходимо добавить @cu_clubs_bot в канал и выдать ему права администратора
  - Необходимо указать именно ID канала, добавив вначало -100
  При возникновении вопросов обратиться к @uikola

subscription_access_not_allowed: |-
  Данная функция доступна для клубов, вышедших на seed. Если вы уже достигли данного уровня,
  то обратитесь к администратору
